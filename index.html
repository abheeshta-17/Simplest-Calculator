<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator">
        <h1 class="title">Simple Calculator !!!</h1>
        <p class="subtitle">heyyy!! i think its pretty self explanatory what you should do lolz enjoy!!</p>

        <input type="number" id="userInput1" placeholder="first number">
        <input type="number" id="userInput2" placeholder="second number">
    
        <div class = "buttons">
             <button onclick="sendData('add')">add(a+b)</button>
             <button onclick="sendData('sub')">subtract(a-b)</button>
             <button onclick="sendData('mul')">multiply(a*b)</button>
             <button onclick="sendData('div')">divide(a/b)</button>
             <button onclick="sendData('mod')">reminder(a%b)</button>
        </div>
    <p id="output"></p>
    </div>
    

    <script>
        function sendData(type) {
            let input1 = Number(document.getElementById("userInput1").value);
            let input2 = Number(document.getElementById("userInput2").value);
            if (type === 'add'){
            document.getElementById("output").innerText = input1 + input2;
            }
            else if (type === 'sub'){
            document.getElementById("output").innerText = input1 - input2;
            }
            else if (type === 'mul'){
            document.getElementById("output").innerText = input1 * input2;
            }
            else if (type === 'div'){
            document.getElementById("output").innerText = input1 / input2;
            }
            else if (type === 'mod'){
            document.getElementById("output").innerText = input1 % input2;
            }

        }
    </script>

</body>
</html>
